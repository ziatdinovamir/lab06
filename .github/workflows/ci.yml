name: CI Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }} - ${{ matrix.build_type }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        build_type: [Release, Debug]
        include:
          - os: ubuntu-latest
            build_type: Release
            cpack_generator: "TGZ;DEB;RPM"
          - os: ubuntu-latest
            build_type: Debug
            cpack_generator: "TGZ"
          - os: macos-latest
            build_type: Release
            cpack_generator: "DragNDrop;TGZ"
          - os: macos-latest
            build_type: Debug
            cpack_generator: "TGZ"
          - os: windows-latest
            build_type: Release
            cpack_generator: "WIX;ZIP"
          - os: windows-latest
            build_type: Debug
            cpack_generator: "ZIP"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup Ubuntu
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake build-essential rpm
      shell: bash
    
    - name: Setup macOS
      if: matrix.os == 'macos-latest'
      run: |
        brew install cmake
      shell: bash
    
    - name: Setup Windows
      if: matrix.os == 'windows-latest'
      run: |
        cmake --version
        echo "WiX Toolset is pre-installed"
      shell: powershell
    
    - name: Configure CMake
      run: cmake -H. -B_build -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
      shell: bash
    
    - name: Build
      run: cmake --build _build --config ${{ matrix.build_type }}
      shell: bash
    
    - name: Create packages
      run: |
        cd _build
        cpack -G "${{ matrix.cpack_generator }}"
      shell: bash
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          _build/*.tar.gz
          _build/*.deb
          _build/*.rpm
          _build/*.dmg
          _build/*.zip
          _build/*.msi
          _build/*.exe
      continue-on-error: true
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest' && matrix.build_type == 'Release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          _build/*.tar.gz
          _build/*.deb
          _build/*.rpm
          _build/*.dmg
          _build/*.zip
          _build/*.msi
          _build/*.exe
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
