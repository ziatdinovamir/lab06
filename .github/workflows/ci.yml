name: CI Build and Package

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        build_type: [Release, Debug]
        include:
          - os: ubuntu-latest
            generator: "Unix Makefiles"
            cpack_generator: "TGZ;DEB"
            deps: "sudo apt-get update && sudo apt-get install -y cmake build-essential"
          - os: windows-latest
            generator: "Visual Studio 17 2022"
            cpack_generator: "ZIP"  # Убрал NSIS, оставил только ZIP
            deps: "choco install cmake --installargs 'ADD_CMAKE_TO_PATH=System' || echo 'CMake already installed'"
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install dependencies (${{ matrix.os }})
      run: ${{ matrix.deps }}
      shell: bash
    
    - name: Configure CMake
      run: cmake -H. -B_build -DCPACK_GENERATOR="${{ matrix.cpack_generator }}"
      shell: bash
    
    - name: Build
      run: cmake --build _build --config ${{ matrix.build_type }}
      shell: bash
    
    - name: Create package
      run: cmake --build _build --target package --config ${{ matrix.build_type }}
      shell: bash
      continue-on-error: false
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: packages-${{ matrix.os }}-${{ matrix.build_type }}
        path: |
          _build/*.tar.gz
          _build/*.deb
          _build/*.zip
          _build/*.exe
          _build/*.dmg
      continue-on-error: true
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/') && matrix.os == 'ubuntu-latest' && matrix.build_type == 'Release'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          _build/*.tar.gz
          _build/*.deb
          _build/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
